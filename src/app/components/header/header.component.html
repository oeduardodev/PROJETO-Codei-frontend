<nav>
  <div class="menu" (click)="toggleMenu()">
    <fa-icon
      *ngIf="!(menuOpen$ | async)"
      class="icon"
      [icon]="faBars"
    ></fa-icon>
    <fa-icon *ngIf="menuOpen$ | async" [icon]="faArrowLeft"></fa-icon>
  </div>
  <div class="logo">
    <a class="brand" routerLink="/">
      <img src="/assets/logo.png" alt="Codei logo" />
      <h2>Codei</h2>
    </a>
  </div>

  <form class="search">
    <input
      type="text"
      placeholder="Busque por algo..."
      (input)="search($event)"
    />
    <fa-icon class="icon" [icon]="faSearch" (click)="closeMenu()"></fa-icon>
  </form>

  <ul class="links">
    <li (click)="closeMenu()" *ngIf="currentRoute !== '/moments/new'">
      <a
        class="butn butn__new button-text"
        [routerLink]="userLogged ? '/moments/new' : '/login'"
        >Compartilhar</a
      >
    </li>
    <li (click)="closeMenu()" *ngIf="currentRoute !== '/moments/new'">
      <fa-icon
        class="butn butn__new button-icon icon share-button"
        routerLink="/moments/new"
        [icon]="faShare"
      ></fa-icon>
    </li>
    <div class="link-icons">
      <!-- Exibe faUser apenas na rota '/' -->
      <li
        (click)="closeMenu()"
        *ngIf="currentRoute === '/' || currentRoute === '/moments/new'"
      >
        <a [routerLink]="userLogged ? '/profile' : '/login'">
          <fa-icon class="icon user-button" [icon]="faUser"></fa-icon>
        </a>
      </li>

      <!-- Exibe faHouse apenas nas rotas '/profile' ou '/login' -->
      <li
        (click)="closeMenu()"
        *ngIf="
          currentRoute === '/profile' ||
          currentRoute === '/login' ||
          currentRoute === '/moments/new'
        "
      >
        <a routerLink="/">
          <fa-icon class="icon" [icon]="faHouse"></fa-icon>
        </a>
      </li>
    </div>
  </ul>
</nav>
